<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>FilmFly</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.css">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/lang/summernote-ko-KR.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../js/common.js"></script>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    a {
      font-size: 16px;
      text-decoration: none;
      color: inherit;
    }
    ul {
      list-style: none;
    }
  </style>
</head>
<body>
<div class="container">
  <header id="common-header"></header>

  <input type="text" id="inputBoardTitle" class="w-100 p-2 mb-2" placeholder="제목">
  <textarea id="summernote"></textarea>
  <button id="btnSaveBoard" class="btn btn-primary mt-3">저장</button>
</div>

<script src="../js/summernote.js"></script>
<script>
  $(document).ready(function () {
    $('#summernote').summernote({
      lang: 'ko-KR',
      height: 300
    });

    const urlParams = new URL(location.href).searchParams;
    let boardId = urlParams.get('board');

    if (boardId) {
      $.ajax({
        type: 'GET',
        url: `http://localhost:8080/boards/${boardId}`,
        success: function (result) {
          const board = result.data;
          $('#inputBoardTitle').val(board.title);
          $('#summernote').summernote('code', board.content);
          $('#btnSaveBoard').text('수정');
        },
        error: function (xhr, status, er) {
          console.error('게시물 데이터를 불러오는데 실패했습니다.', xhr.responseJSON);
          alert("게시물 데이터를 불러오는데 실패했습니다.");
        }
      });
    }

    $('#btnSaveBoard').on('click', function () {
      let title = $('#inputBoardTitle').val();
      let content = $('#summernote').summernote('code');

      let data = {
        title: title,
        content: content
      };
      data = JSON.stringify(data);
      console.log('전송할 데이터' + data);

      $.ajax({
        type: boardId ? 'PATCH' : 'POST',
        url: boardId ? `http://localhost:8080/boards/${boardId}` : 'http://localhost:8080/boards',
        data: data,
        contentType: "application/json;charset=utf-8",
        success: function (result, status, xhr) {
          alert('게시물이 성공적으로 저장되었습니다.');
          location.replace(`./board-detail.html?board=${result.data.id}`); // 저장 후 목록 페이지로 이동
        },
        error: function (xhr, status, er) {
          console.error('게시물 저장 실패', xhr.responseJSON);
          alert("게시물 저장 실패");
        }
      });
    });
  });
</script>
</body>
</html>
